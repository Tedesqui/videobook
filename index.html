<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gere Vídeo pelo Texto Capturado - Hunyuan</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.1/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary-color: #0d6efd;
            --primary-hover: #0056b3;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-radius: 12px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden;
        }

        .container {
            width: 100%; max-width: 500px; padding: 20px;
            box-sizing: border-box; display: flex; flex-direction: column;
            align-items: center; gap: 15px;
        }

        h2 { text-align: center; margin-bottom: 10px; }

        #camera-container {
            width: 100%; background-color: var(--card-bg);
            border-radius: var(--border-radius); overflow: hidden;
            position: relative; aspect-ratio: 4 / 3;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333;
        }

        #camera { width: 100%; height: 100%; object-fit: cover; }
        #snapshot { display: none; }

        .controls-container {
            display: flex; /* Alterado para linha */
            flex-direction: row;
            align-items: center;
            gap: 10px; /* Espaçamento entre botões */
            width: 90%;
            justify-content: center;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        #captureBtn, #zoomBtn { /* Estilo aplicado a ambos os botões */
            flex-grow: 1; /* Faz os botões dividirem o espaço */
            padding: 15px 10px; font-size: 16px;
            font-weight: bold; background-color: var(--primary-color);
            color: white; border: none; border-radius: var(--border-radius);
            cursor: pointer; transition: background-color 0.3s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-align: center;
        }

        #captureBtn:hover, #zoomBtn:hover { background-color: var(--primary-hover); }
        #captureBtn:active, #zoomBtn:active { transform: scale(0.98); }
        #captureBtn:disabled, #zoomBtn:disabled { background-color: #555; cursor: not-allowed; }

        .consistency-control {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; user-select: none;
        }

        #status { text-align: center; min-height: 40px; color: #aaa; }
        #videoGerado { width: 100%; margin-top: 15px; }
        #videoGerado video { width: 100%; border-radius: var(--border-radius); border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="container">
        <h2>OCR para Vídeo com Hunyuan</h2>

        <div id="camera-container">
            <video id="camera" autoplay playsinline muted></video>
        </div>
        <canvas id="snapshot"></canvas>

        <div class="button-group">
            <div class="controls-container">
                <button id="zoomBtn">🔍 Zoom 1x</button>
                <button id="captureBtn">
                    <span>📷</span> Capturar e Gerar
                </button>
            </div>
            <div class="consistency-control">
                <input type="checkbox" id="consistencyCheck">
                <label for="consistencyCheck">Manter consistência (usar mesma semente)</label>
            </div>
        </div>

        <p id="status">Aponte a câmara para um texto.</p>
        <div id="videoGerado"></div>
    </div>

    <script>
        const videoEl = document.getElementById('camera');
        const canvasEl = document.getElementById('snapshot');
        const statusEl = document.getElementById('status');
        const videoGeradoEl = document.getElementById('videoGerado');
        const captureBtnEl = document.getElementById('captureBtn');
        const consistencyCheckEl = document.getElementById('consistencyCheck');
        const zoomBtnEl = document.getElementById('zoomBtn'); // Referência ao botão de zoom

        let lastUsedSeed = null;
        // Variáveis para o controlo do zoom
        let mediaTrack;
        let currentZoom = 1;
        const zoomLevels = [1, 2, 3];
        let zoomCapabilities = null;

        async function startCamera() {
            statusEl.textContent = "A iniciar câmara...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 } }
                });
                videoEl.srcObject = stream;
                mediaTrack = stream.getVideoTracks()[0];
                
                // Verifica se o dispositivo suporta zoom
                if (mediaTrack.getCapabilities && mediaTrack.getCapabilities().zoom) {
                    zoomCapabilities = mediaTrack.getCapabilities().zoom;
                } else {
                    zoomBtnEl.disabled = true;
                    zoomBtnEl.innerText = "Zoom N/A";
                }
                statusEl.textContent = "Câmara pronta. Aponte para um texto.";
            } catch (err) {
                statusEl.textContent = `❌ Erro: ${err.message}`;
                zoomBtnEl.disabled = true;
            }
        }

        // Função para alternar o zoom
        function toggleZoom() {
            if (!zoomCapabilities) return;

            const currentIndex = zoomLevels.indexOf(currentZoom);
            currentZoom = zoomLevels[(currentIndex + 1) % zoomLevels.length];

            if (currentZoom > zoomCapabilities.max) {
                currentZoom = zoomLevels[0]; // Volta para 1x
            }

            mediaTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] });
            zoomBtnEl.innerText = `🔍 Zoom ${currentZoom}x`;
        }

        async function captureAndGenerate() {
            captureBtnEl.disabled = true;
            captureBtnEl.innerHTML = `<span>⏳</span> A processar...`;
            videoGeradoEl.innerHTML = '';

            try {
                const context = canvasEl.getContext('2d');
                canvasEl.width = videoEl.videoWidth;
                canvasEl.height = videoEl.videoHeight;
                context.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
                const dataURL = canvasEl.toDataURL('image/png');

                statusEl.textContent = "🧠 A ler texto com OCR...";
                const { data: { text } } = await Tesseract.recognize(dataURL, 'eng', {
                    logger: m => statusEl.textContent = `🧠 A ler... (${Math.round(m.progress * 100)}%)`
                });

                const prompt = text.trim();
                if (prompt.length < 5) throw new Error("Texto detetado é muito curto.");
                
                statusEl.textContent = `📝 Prompt: "${prompt}"\n\nA gerar vídeo...`;

                await generateVideoFromPrompt(prompt);

            } catch (error) {
                statusEl.textContent = `❌ Erro: ${error.message}`;
            } finally {
                captureBtnEl.disabled = false;
                captureBtnEl.innerHTML = `<span>📷</span> Capturar e Gerar`;
            }
        }

        async function generateVideoFromPrompt(prompt) {
            const bodyPayload = { prompt };
            if (consistencyCheckEl.checked && lastUsedSeed !== null) {
                bodyPayload.seed = lastUsedSeed;
                statusEl.textContent += ` (Usando semente: ${lastUsedSeed})`;
            }

            const response = await fetch('/api/gerar-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyPayload)
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || "Falha na comunicação com o servidor.");
            }

            const data = await response.json();
            
            if (data.videoURL) {
                videoGeradoEl.innerHTML = `<video src="${data.videoURL}" controls autoplay loop></video>`;
                statusEl.textContent = "✅ Vídeo gerado com sucesso!";
                lastUsedSeed = data.seed;
            } else {
                throw new Error("Não foi possível obter o URL do vídeo gerado.");
            }
        }

        captureBtnEl.addEventListener('click', captureAndGenerate);
        zoomBtnEl.addEventListener('click', toggleZoom); // Adiciona o listener ao botão de zoom
        startCamera();
    </script>
</body>
</html>
