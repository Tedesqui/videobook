<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gere Vídeo com Hugging Face</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.1/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary-color: #ffc222; /* Cor da Hugging Face */
            --primary-hover: #e6b31f;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-radius: 12px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden;
        }

        .container {
            width: 100%; max-width: 500px; padding: 20px;
            box-sizing: border-box; display: flex; flex-direction: column;
            align-items: center; gap: 15px;
        }

        h2 { text-align: center; margin-bottom: 10px; }

        #camera-container {
            width: 100%; background-color: var(--card-bg);
            border-radius: var(--border-radius); overflow: hidden;
            position: relative; aspect-ratio: 4 / 3;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333;
        }

        #camera { width: 100%; height: 100%; object-fit: cover; }
        #snapshot { display: none; }

        .controls-container {
            display: flex; flex-direction: column; align-items: center;
            gap: 15px; width: 80%;
        }

        #captureBtn {
            width: 100%; padding: 15px 20px; font-size: 18px;
            font-weight: bold; background-color: var(--primary-color);
            color: #121212; border: none; border-radius: var(--border-radius);
            cursor: pointer; transition: background-color 0.3s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        #captureBtn:hover { background-color: var(--primary-hover); }
        #captureBtn:active { transform: scale(0.98); }
        #captureBtn:disabled { background-color: #555; color: #aaa; cursor: not-allowed; }

        #status { text-align: center; min-height: 40px; color: #aaa; }
        #videoGerado { width: 100%; margin-top: 15px; }
        #videoGerado video { width: 100%; border-radius: var(--border-radius); border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="container">
        <h2>OCR para Vídeo com Hugging Face</h2>

        <div id="camera-container">
            <video id="camera" autoplay playsinline muted></video>
        </div>
        <canvas id="snapshot"></canvas>

        <div class="controls-container">
            <button id="captureBtn">
                <span>📷</span> Capturar e Gerar
            </button>
        </div>

        <p id="status">Aponte a câmara para um texto.</p>
        <div id="videoGerado"></div>
    </div>

    <script>
        const videoEl = document.getElementById('camera');
        const canvasEl = document.getElementById('snapshot');
        const statusEl = document.getElementById('status');
        const videoGeradoEl = document.getElementById('videoGerado');
        const captureBtnEl = document.getElementById('captureBtn');

        async function startCamera() {
            statusEl.textContent = "A iniciar câmara...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 } }
                });
                videoEl.srcObject = stream;
                statusEl.textContent = "Câmara pronta. Aponte para um texto.";
            } catch (err) {
                statusEl.textContent = `❌ Erro: ${err.message}`;
            }
        }

        async function captureAndGenerate() {
            captureBtnEl.disabled = true;
            captureBtnEl.innerHTML = `<span>⏳</span> A processar...`;
            videoGeradoEl.innerHTML = '';

            try {
                const context = canvasEl.getContext('2d');
                canvasEl.width = videoEl.videoWidth;
                canvasEl.height = videoEl.videoHeight;
                context.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
                const dataURL = canvasEl.toDataURL('image/png');

                statusEl.textContent = "🧠 A ler texto com OCR...";
                const { data: { text } } = await Tesseract.recognize(dataURL, 'eng', {
                    logger: m => statusEl.textContent = `🧠 A ler... (${Math.round(m.progress * 100)}%)`
                });

                const prompt = text.trim();
                if (prompt.length < 5) throw new Error("Texto detetado é muito curto.");
                
                statusEl.textContent = `📝 Prompt: "${prompt}"\n\nA gerar vídeo com Hugging Face...`;

                await generateVideoFromPrompt(prompt);

            } catch (error) {
                statusEl.textContent = `❌ Erro: ${error.message}`;
            } finally {
                captureBtnEl.disabled = false;
                captureBtnEl.innerHTML = `<span>📷</span> Capturar e Gerar`;
            }
        }

        async function generateVideoFromPrompt(prompt) {
            const response = await fetch('/api/gerar-video-hf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || "Falha na comunicação com o servidor.");
            }

            // **MUDANÇA IMPORTANTE:** A resposta agora é o vídeo em si (um "Blob").
            const videoBlob = await response.blob();
            
            // Cria um URL temporário para o vídeo recebido.
            const videoUrl = URL.createObjectURL(videoBlob);
            
            videoGeradoEl.innerHTML = `<video src="${videoUrl}" controls autoplay loop></video>`;
            statusEl.textContent = "✅ Vídeo gerado com sucesso!";
        }

        captureBtnEl.addEventListener('click', captureAndGenerate);
        startCamera();
    </script>
</body>
</html>
