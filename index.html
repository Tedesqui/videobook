<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>𝐕𝐈𝐃𝐄𝐎𝐁𝐎𝐎𝐊 - Inteligência Artificial (IA) que gera vídeos através de fotos de páginas de livros</title>
    <style>
        :root {
            --aws-orange: #FF9900;
            --replicate-black: #1c1c1c;
            --dark-bg: #232F3E;
            --card-bg: #1e1e1e;
            --text-color: #FFFFFF;
            --border-radius: 12px;
        }

        body, html {
            margin: 0; 
            padding: 0; 
            height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow-y: auto;
        }

        .container {
            width: 100%; max-width: 500px; padding: 20px;   
            box-sizing: border-box; display: flex; flex-direction: column;
            align-items: center; gap: 15px;
            font-size: 70%;
            /* Posição ajustada para 30px para baixo */
            margin-top: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.4em; 
        }

        #camera-container {
            width: 100%; background-color: var(--card-bg);           
            border-radius: var(--border-radius); overflow: hidden;
            position: relative; aspect-ratio: 4 / 4;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333;
        }

        #camera, #snapshot {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
        }

        #snapshot { display: none; }

        .controls {
            display: flex; gap: 10px; width: 90%;
        }

        button {
            flex-grow: 1;
            padding: 12px 8px; 
            font-size: 13px;
            font-weight: bold; background-color: var(--replicate-black);
            color: white; border: 1px solid #444; border-radius: var(--border-radius);
            cursor: pointer; transition: background-color 0.3s, transform 0.1s, opacity 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        #analyzeBtn, #generateVideoBtn { background-color: var(--aws-orange); color: #111; }

        button:hover { filter: brightness(1.2); }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #2a2a2a; color: #777; cursor: not-allowed; }

        #previewControls, #textConfirmationContainer { display: none; }
        
        .consistency-control {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; user-select: none;
            margin-top: 10px;
            font-size: 1.3em;
        }
        
        #ocrResultText {
            width: 90%;
            height: 100px;
            background-color: var(--card-bg);
            border: 1px solid #444;
            color: var(--text-color);
            border-radius: var(--border-radius);
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        #status {
            text-align: center;
            min-height: 40px;
            color: #ccc;
            font-size: 1.3em;
        }
        
        #videoGerado { width: 100%; margin-top: 15px; }
        #videoGerado video { width: 100%; border-radius: var(--border-radius); border: 1px solid #333; }

        /* Estilo para o texto de contato */
        .contact-info {
            /* Posição ajustada para 20px (50px - 30px) */
            margin-top: 20px;
            color: #aaa;
            font-size: 1.3em;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>𝐕𝐈𝐃𝐄𝐎𝐁𝐎𝐎𝐊 - Inteligência Artificial (IA) que gera vídeos através de fotos de páginas de livros</h2>

        <div id="camera-container">
            <video id="camera" autoplay playsinline muted></video>
            <canvas id="snapshot"></canvas>
        </div>

        <div id="initialControls" class="controls">
            <button id="zoomBtn">🔍 Zoom 1x</button>
            <button id="takePhotoBtn">📷 Tirar Foto</button>
        </div>

        <div id="previewControls" class="controls">
            <button id="retryBtn">🔄 Tentar Novamente</button>
            <button id="analyzeBtn">✅ Ler Texto da Foto</button>
        </div>
        
        <div id="textConfirmationContainer">
            <textarea id="ocrResultText"></textarea>
            <div class="controls" style="margin-top: 10px;">
                 <button id="generateVideoBtn">🎬 Gerar Vídeo</button>
            </div>
        </div>
        
        <div class="consistency-control">
            <input type="checkbox" id="consistencyCheck">
            <label for="consistencyCheck">Manter consistência</label>
        </div>

        <p id="status">Aponte a câmera para um texto.</p>
        
        <div id="videoGerado"></div>
        
        <!-- Contato posicionado abaixo do status -->
        <p class="contact-info">Contato: jeantedesqui@yahoo.com.br</p>
    </div>

    <script>
        const videoEl = document.getElementById('camera');
        const canvasEl = document.getElementById('snapshot');
        const statusEl = document.getElementById('status');
        const videoGeradoEl = document.getElementById('videoGerado');
        
        const zoomBtn = document.getElementById('zoomBtn');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const retryBtn = document.getElementById('retryBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const generateVideoBtn = document.getElementById('generateVideoBtn');
        const consistencyCheckEl = document.getElementById('consistencyCheck');
        const ocrResultTextEl = document.getElementById('ocrResultText');

        const initialControls = document.getElementById('initialControls');
        const previewControls = document.getElementById('previewControls');
        const textConfirmationContainer = document.getElementById('textConfirmationContainer');

        let mediaTrack, currentZoom = 1, zoomCapabilities = null, lastUsedSeed = null;
        const zoomLevels = [1, 2, 3];

        async function startCamera() {
            statusEl.textContent = "A iniciar câmara...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
                videoEl.srcObject = stream;
                mediaTrack = stream.getVideoTracks()[0];
                zoomCapabilities = mediaTrack.getCapabilities().zoom;
                if (!zoomCapabilities) {
                    zoomBtn.disabled = true;
                    zoomBtn.innerText = "Zoom N/A";
                }
                statusEl.textContent = "Câmera pronta. Aponte para um texto.";
            } catch (err) {
                statusEl.textContent = `❌ Erro: ${err.message}`;
            }
        }

        function toggleZoom() {
            if (!zoomCapabilities) return;
            const currentIndex = zoomLevels.indexOf(currentZoom);
            currentZoom = zoomLevels[(currentIndex + 1) % zoomLevels.length];
            if (currentZoom > zoomCapabilities.max) currentZoom = zoomLevels[0];
            mediaTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] });
            zoomBtn.innerText = `🔍 Zoom ${currentZoom}x`;
        }

        function takePhoto() {
            canvasEl.width = videoEl.videoWidth;
            canvasEl.height = videoEl.videoHeight;
            canvasEl.getContext('2d').drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
            canvasEl.style.display = 'block';
            videoEl.style.display = 'none';
            initialControls.style.display = 'none';
            previewControls.style.display = 'flex';
            statusEl.textContent = "Foto capturada. Deseja ler o texto?";
        }

        function resetPhoto() {
            videoEl.style.display = 'block';
            canvasEl.style.display = 'none';
            previewControls.style.display = 'none';
            initialControls.style.display = 'flex';
            textConfirmationContainer.style.display = 'none';
            statusEl.textContent = "Câmera pronta. Aponte para um texto.";
            videoGeradoEl.innerHTML = '';
        }

        async function analyzePhoto() {
            analyzeBtn.disabled = true;
            retryBtn.disabled = true;
            statusEl.textContent = "🧠 Lendo o texto...";
            try {
                const imageBase64 = canvasEl.toDataURL('image/png');
                const response = await fetch('/api/ocr-aws', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64 })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Falha ao ler texto.");
                
                ocrResultTextEl.value = data.text;
                previewControls.style.display = 'none';
                textConfirmationContainer.style.display = 'block';
                statusEl.textContent = "Confirme ou edite o texto lido.";

            } catch (error) {
                statusEl.textContent = `❌ Erro: ${error.message}`;
            } finally {
                analyzeBtn.disabled = false;
                retryBtn.disabled = false;
            }
        }
        
        async function generateVideo() {
            generateVideoBtn.disabled = true;
            videoGeradoEl.innerHTML = '';
            const prompt = ocrResultTextEl.value;
            if (!prompt || prompt.length < 5) {
                statusEl.textContent = "❌ Erro: O texto é muito curto para gerar um vídeo.";
                generateVideoBtn.disabled = false;
                return;
            }
            
            statusEl.textContent = `🎬 A enviar texto para Replicate... (Isto pode demorar um pouco)`;
            try {
                const bodyPayload = { prompt };
                if (consistencyCheckEl.checked && lastUsedSeed !== null) {
                    bodyPayload.seed = lastUsedSeed;
                }
                const response = await fetch('/api/gerar-video-replicate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyPayload)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Falha na geração do vídeo.");
                
                if (data.videoURL) {
                    videoGeradoEl.innerHTML = `<video src="${data.videoURL}" controls autoplay loop></video>`;
                    statusEl.textContent = "✅ Vídeo gerado com sucesso!";
                    lastUsedSeed = data.seed; 
                } else {
                    throw new Error("Não foi possível obter o URL do vídeo gerado.");
                }
            } catch (error) {
                statusEl.textContent = `❌ Erro: ${error.message}`;
            } finally {
                generateVideoBtn.disabled = false;
            }
        }

        zoomBtn.addEventListener('click', toggleZoom);
        takePhotoBtn.addEventListener('click', takePhoto);
        retryBtn.addEventListener('click', resetPhoto);
        analyzeBtn.addEventListener('click', analyzePhoto);
        generateVideoBtn.addEventListener('click', generateVideo);
        
        startCamera();
    </script>
</body>
</html>
