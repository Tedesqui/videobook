<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Foto para Vídeo com Replicate</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.1/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary-color: #1c1c1c; /* Cor da Replicate */
            --primary-hover: #333;
            --dark-bg: #0a0a0a;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-radius: 12px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden;
        }

        .container {
            width: 100%; max-width: 500px; padding: 20px;
            box-sizing: border-box; display: flex; flex-direction: column;
            align-items: center; gap: 15px;
        }

        h2 { text-align: center; margin-bottom: 10px; }

        #camera-container {
            width: 100%; background-color: var(--card-bg);
            border-radius: var(--border-radius); overflow: hidden;
            position: relative; aspect-ratio: 4 / 3;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333;
        }

        /* O vídeo e o canvas ocupam o mesmo espaço, um por cima do outro */
        #camera, #snapshot {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
        }

        #snapshot { display: none; } /* O canvas começa escondido */

        .controls {
            display: flex; gap: 10px; width: 90%;
        }

        button {
            flex-grow: 1;
            padding: 15px 10px; font-size: 16px;
            font-weight: bold; background-color: var(--primary-color);
            color: white; border: 1px solid #444; border-radius: var(--border-radius);
            cursor: pointer; transition: background-color 0.3s, transform 0.1s, opacity 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        button:hover { background-color: var(--primary-hover); }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #2a2a2a; color: #777; cursor: not-allowed; }

        /* Esconde os controlos que não devem aparecer no início */
        #previewControls { display: none; }

        #status { text-align: center; min-height: 40px; color: #aaa; }
        #videoGerado { width: 100%; margin-top: 15px; }
        #videoGerado video { width: 100%; border-radius: var(--border-radius); border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="container">
        <h2>OCR para Vídeo com Replicate</h2>

        <div id="camera-container">
            <video id="camera" autoplay playsinline muted></video>
            <canvas id="snapshot"></canvas>
        </div>

        <!-- Controlos iniciais -->
        <div id="initialControls" class="controls">
            <button id="zoomBtn">🔍 Zoom 1x</button>
            <button id="takePhotoBtn">📷 Tirar Foto</button>
        </div>

        <!-- Controlos da pré-visualização da foto -->
        <div id="previewControls" class="controls">
            <button id="retryBtn">🔄 Tentar Novamente</button>
            <button id="analyzeBtn">✅ Usar esta Foto</button>
        </div>

        <p id="status">Aponte a câmara para um texto.</p>
        <div id="videoGerado"></div>
    </div>

    <script>
        const videoEl = document.getElementById('camera');
        const canvasEl = document.getElementById('snapshot');
        const statusEl = document.getElementById('status');
        const videoGeradoEl = document.getElementById('videoGerado');
        
        // Botões
        const zoomBtn = document.getElementById('zoomBtn');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const retryBtn = document.getElementById('retryBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');

        // Divs de controlo
        const initialControls = document.getElementById('initialControls');
        const previewControls = document.getElementById('previewControls');

        // Variáveis de estado
        let mediaTrack;
        let currentZoom = 1;
        const zoomLevels = [1, 2, 3];
        let zoomCapabilities = null;

        async function startCamera() {
            statusEl.textContent = "A iniciar câmara...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 } }
                });
                videoEl.srcObject = stream;
                mediaTrack = stream.getVideoTracks()[0];
                
                if (mediaTrack.getCapabilities && mediaTrack.getCapabilities().zoom) {
                    zoomCapabilities = mediaTrack.getCapabilities().zoom;
                } else {
                    zoomBtn.disabled = true;
                    zoomBtn.innerText = "Zoom N/A";
                }
                statusEl.textContent = "Câmara pronta. Aponte para um texto.";
            } catch (err) {
                statusEl.textContent = `❌ Erro: ${err.message}`;
            }
        }

        function toggleZoom() {
            if (!zoomCapabilities) return;
            const currentIndex = zoomLevels.indexOf(currentZoom);
            currentZoom = zoomLevels[(currentIndex + 1) % zoomLevels.length];
            if (currentZoom > zoomCapabilities.max) currentZoom = zoomLevels[0];
            mediaTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] });
            zoomBtn.innerText = `🔍 Zoom ${currentZoom}x`;
        }

        function takePhoto() {
            canvasEl.width = videoEl.videoWidth;
            canvasEl.height = videoEl.videoHeight;
            canvasEl.getContext('2d').drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
            
            // Mostra a foto e esconde o vídeo
            canvasEl.style.display = 'block';
            videoEl.style.display = 'none';

            // Troca os botões de controlo
            initialControls.style.display = 'none';
            previewControls.style.display = 'flex';
            statusEl.textContent = "Foto capturada. Deseja usá-la?";
        }

        function resetPhoto() {
            // Mostra o vídeo e esconde a foto
            videoEl.style.display = 'block';
            canvasEl.style.display = 'none';

            // Troca os botões de controlo de volta
            previewControls.style.display = 'none';
            initialControls.style.display = 'flex';
            statusEl.textContent = "Câmara pronta. Aponte para um texto.";
            videoGeradoEl.innerHTML = ''; // Limpa o vídeo anterior
        }

        async function analyzePhoto() {
            analyzeBtn.disabled = true;
            retryBtn.disabled = true;
            videoGeradoEl.innerHTML = '';

            try {
                statusEl.textContent = "🧠 A ler texto com OCR...";
                const { data: { text } } = await Tesseract.recognize(canvasEl, 'eng', {
                    logger: m => statusEl.textContent = `🧠 A ler... (${Math.round(m.progress * 100)}%)`
                });

                const prompt = text.trim();
                if (prompt.length < 5) throw new Error("Texto detetado é muito curto.");
                
                statusEl.textContent = `📝 Prompt: "${prompt}"\n\nA gerar vídeo com Replicate... (Isto pode demorar um pouco)`;

                await generateVideoFromPrompt(prompt);

            } catch (error) {
                statusEl.textContent = `❌ Erro: ${error.message}`;
            } finally {
                analyzeBtn.disabled = false;
                retryBtn.disabled = false;
                // **CORREÇÃO:** A chamada para resetPhoto() foi removida daqui.
                // Agora, a interface espera que o utilizador clique em "Tentar Novamente".
            }
        }

        async function generateVideoFromPrompt(prompt) {
            const response = await fetch('/api/gerar-video-replicate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Falha na comunicação com o servidor.");
            
            if (data.videoURL) {
                videoGeradoEl.innerHTML = `<video src="${data.videoURL}" controls autoplay loop></video>`;
                statusEl.textContent = "✅ Vídeo gerado com sucesso!";
            } else {
                throw new Error("Não foi possível obter o URL do vídeo gerado.");
            }
        }

        // Adiciona os listeners aos botões
        zoomBtn.addEventListener('click', toggleZoom);
        takePhotoBtn.addEventListener('click', takePhoto);
        retryBtn.addEventListener('click', resetPhoto);
        analyzeBtn.addEventListener('click', analyzePhoto);
        
        startCamera();
    </script>
</body>
</html>
