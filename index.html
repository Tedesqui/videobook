<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>𝐈𝐌𝐀𝐆𝐄𝐁𝐎𝐎𝐊 - Inteligência Artificial (IA) que gera imagens através de fotos de páginas de livros</title>
    <style>
        :root {
            --aws-orange: #FF9900;
            --replicate-black: #1c1c1c;
            --dark-bg: #232F3E;
            --card-bg: #1e1e1e;
            --text-color: #FFFFFF;
            --border-radius: 12px;
        }

        body, html {
            margin: 0; 
            padding: 0; 
            height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow-y: auto;
        }

        .container {
            width: 100%; max-width: 500px; padding: 20px;   
            box-sizing: border-box; display: flex; flex-direction: column;
            align-items: center; gap: 15px;
            font-size: 70%;
            margin-top: 40px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.68em; 
        }

        #camera-container {
            width: 100%; background-color: var(--card-bg);           
            border-radius: var(--border-radius); overflow: hidden;
            position: relative; aspect-ratio: 4 / 4;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333;
        }

        #camera, #snapshot {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
        }

        #snapshot { display: none; }

        .controls {
            display: flex; gap: 10px; width: 90%;
        }

        button {
            flex-grow: 1;
            padding: 12px 8px; 
            font-size: 13px;
            font-weight: bold; background-color: var(--replicate-black);
            color: white; border: 1px solid #444; border-radius: var(--border-radius);
            cursor: pointer; transition: background-color 0.3s, transform 0.1s, opacity 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        #analyzeBtn, #generateImageBtn { background-color: var(--aws-orange); color: #111; }

        button:hover { filter: brightness(1.2); }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #2a2a2a; color: #777; cursor: not-allowed; }

        #previewControls, #textConfirmationContainer { display: none; }
        
        .consistency-control {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; user-select: none;
            margin-top: 10px;
            font-size: 1.3em;
        }
        
        #ocrResultText {
            width: 90%;
            height: 100px;
            background-color: var(--card-bg);
            border: 1px solid #444;
            color: var(--text-color);
            border-radius: var(--border-radius);
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        #status {
            text-align: center;
            min-height: 40px;
            color: #ccc;
            font-size: 1.3em;
        }
        
        #imagemGerada { width: 100%; margin-top: 15px; }
        #imagemGerada img { width: 100%; border-radius: var(--border-radius); border: 1px solid #333; }

        .contact-info {
            margin-top: -70px;
            color: #aaa;
            font-size: 1.3em;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>𝐈𝐌𝐀𝐆𝐄𝐁𝐎𝐎𝐊 - IA que gera imagens de páginas de livros</h2>

        <div id="camera-container">
            <video id="camera" autoplay playsinline muted></video>
            <canvas id="snapshot"></canvas>
        </div>

        <!-- Controlos iniciais visíveis -->
        <div id="initialControls" class="controls">
            <button id="zoomBtn">🔍 Zoom 1x</button>
            <button id="takePhotoBtn">📷 Tirar Foto</button>
        </div>

        <!-- Controlos para a pré-visualização da foto (inicialmente escondidos) -->
        <div id="previewControls" class="controls">
            <button id="retryBtn">🔄 Tentar Novamente</button>
            <button id="analyzeBtn">✅ Ler Texto da Foto</button>
        </div>
        
        <!-- Container para confirmar o texto lido (inicialmente escondido) -->
        <div id="textConfirmationContainer">
            <textarea id="ocrResultText"></textarea>
            <div class="controls" style="margin-top: 10px;">
                 <button id="generateImageBtn">🖼️ Gerar Imagem</button>
            </div>
        </div>
        
        <!-- Controlo de consistência -->
        <div class="consistency-control">
            <input type="checkbox" id="consistencyCheck">
            <label for="consistencyCheck">Manter consistência</label>
        </div>

        <!-- Elementos de feedback e resultado -->
        <p id="status">Aponte a câmera para um texto.</p>
        <div id="imagemGerada"></div>
        <p class="contact-info">Contato: jeantedesqui@yahoo.com.br</p>
    </div>

    <script>
        // --- Seleção dos Elementos do DOM ---
        const ui = {
            camera: document.getElementById('camera'),
            snapshot: document.getElementById('snapshot'),
            status: document.getElementById('status'),
            imagemGerada: document.getElementById('imagemGerada'), // ALTERADO
            ocrResultText: document.getElementById('ocrResultText'),
            consistencyCheck: document.getElementById('consistencyCheck'),
            buttons: {
                zoom: document.getElementById('zoomBtn'),
                takePhoto: document.getElementById('takePhotoBtn'),
                retry: document.getElementById('retryBtn'),
                analyze: document.getElementById('analyzeBtn'),
                generateImage: document.getElementById('generateImageBtn'), // ALTERADO
            },
            containers: {
                initialControls: document.getElementById('initialControls'),
                previewControls: document.getElementById('previewControls'),
                textConfirmation: document.getElementById('textConfirmationContainer'),
            }
        };

        // --- Variáveis de Estado da Aplicação ---
        let mediaTrack = null;
        let currentZoom = 1;
        const zoomLevels = [1, 2, 3];
        let zoomCapabilities = null;
        let lastUsedSeed = null;

        // --- Funções Principais ---

        /**
         * Inicia a câmera do dispositivo.
         */
        async function startCamera() {
            ui.status.textContent = "A iniciar câmera...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 } } 
                });
                ui.camera.srcObject = stream;
                mediaTrack = stream.getVideoTracks()[0];
                zoomCapabilities = mediaTrack.getCapabilities().zoom;

                if (!zoomCapabilities) {
                    ui.buttons.zoom.disabled = true;
                    ui.buttons.zoom.innerText = "Zoom N/A";
                }
                ui.status.textContent = "Câmera pronta. Aponte para um texto.";
            } catch (err) {
                ui.status.textContent = `❌ Erro ao iniciar a câmera: ${err.message}`;
            }
        }

        /**
         * Alterna entre os níveis de zoom definidos.
         */
        function toggleZoom() {
            if (!zoomCapabilities) return;
            const currentIndex = zoomLevels.indexOf(currentZoom);
            currentZoom = zoomLevels[(currentIndex + 1) % zoomLevels.length];
            if (currentZoom > zoomCapabilities.max) currentZoom = zoomLevels[0];
            
            mediaTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] });
            ui.buttons.zoom.innerText = `🔍 Zoom ${currentZoom}x`;
        }

        /**
         * Captura um frame do vídeo e desenha-o no canvas.
         */
        function takePhoto() {
            ui.snapshot.width = ui.camera.videoWidth;
            ui.snapshot.height = ui.camera.videoHeight;
            ui.snapshot.getContext('2d').drawImage(ui.camera, 0, 0, ui.snapshot.width, ui.snapshot.height);
            
            // Atualiza a UI para o modo de pré-visualização
            ui.snapshot.style.display = 'block';
            ui.camera.style.display = 'none';
            ui.containers.initialControls.style.display = 'none';
            ui.containers.previewControls.style.display = 'flex';
            ui.status.textContent = "Foto capturada. Deseja ler o texto?";
        }

        /**
         * Volta ao modo de câmera, descartando a foto.
         */
        function resetPhoto() {
            ui.camera.style.display = 'block';
            ui.snapshot.style.display = 'none';
            ui.containers.previewControls.style.display = 'none';
            ui.containers.initialControls.style.display = 'flex';
            ui.containers.textConfirmation.style.display = 'none';
            ui.status.textContent = "Câmera pronta. Aponte para um texto.";
            ui.imagemGerada.innerHTML = ''; // ALTERADO
        }

        /**
         * Envia a foto para o backend de OCR e mostra o resultado.
         */
        async function analyzePhoto() {
            ui.buttons.analyze.disabled = true;
            ui.buttons.retry.disabled = true;
            ui.status.textContent = "🧠 Lendo o texto...";
            try {
                const imageBase64 = ui.snapshot.toDataURL('image/png');
                const response = await fetch('/api/ocr-aws', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64 })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Falha ao ler texto.");
                
                ui.ocrResultText.value = data.text;
                ui.containers.previewControls.style.display = 'none';
                ui.containers.textConfirmation.style.display = 'block';
                ui.status.textContent = "Confirme ou edite o texto lido.";

            } catch (error) {
                ui.status.textContent = `❌ Erro no OCR: ${error.message}`;
            } finally {
                ui.buttons.analyze.disabled = false;
                ui.buttons.retry.disabled = false;
            }
        }
        
        /**
         * Envia o texto confirmado para o backend de geração de imagem.
         */
        async function generateImage() { // ALTERADO
            ui.buttons.generateImage.disabled = true; // ALTERADO
            ui.imagemGerada.innerHTML = ''; // ALTERADO
            const prompt = ui.ocrResultText.value;

            if (!prompt || prompt.length < 5) {
                ui.status.textContent = "❌ Erro: O texto é muito curto para gerar uma imagem."; // ALTERADO
                ui.buttons.generateImage.disabled = false; // ALTERADO
                return;
            }
            
            ui.status.textContent = `🎨 A enviar texto para Replicate... (Isto pode demorar um pouco)`; // ALTERADO
            try {
                const bodyPayload = { prompt };
                if (ui.consistencyCheck.checked && lastUsedSeed !== null) {
                    bodyPayload.seed = lastUsedSeed;
                }
                // ALTERADO: Endpoint da API
                const response = await fetch('/api/gerar-imagem-replicate', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyPayload)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Falha na geração da imagem."); // ALTERADO
                
                if (data.imageURL) { // ALTERADO
                    // ALTERADO: Cria um elemento <img> em vez de <video>
                    ui.imagemGerada.innerHTML = `<img src="${data.imageURL}" alt="Imagem Gerada a partir do texto" />`;
                    ui.status.textContent = "✅ Imagem gerada com sucesso!"; // ALTERADO
                    lastUsedSeed = data.seed; 
                } else {
                    throw new Error("Não foi possível obter o URL da imagem gerada."); // ALTERADO
                }
            } catch (error) {
                ui.status.textContent = `❌ Erro na geração da imagem: ${error.message}`; // ALTERADO
            } finally {
                ui.buttons.generateImage.disabled = false; // ALTERADO
            }
        }

        // --- Adicionar Event Listeners ---
        ui.buttons.zoom.addEventListener('click', toggleZoom);
        ui.buttons.takePhoto.addEventListener('click', takePhoto);
        ui.buttons.retry.addEventListener('click', resetPhoto);
        ui.buttons.analyze.addEventListener('click', analyzePhoto);
        ui.buttons.generateImage.addEventListener('click', generateImage); // ALTERADO
        
        // --- Iniciar a Aplicação ---
        startCamera();
    </script>
</body>
</html>
